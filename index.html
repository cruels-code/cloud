<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cloud time II</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000; 
            color: white; 
            font-family: 'Poiret One', cursive; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="controls-overlay" style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Poiret One', cursive;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        text-align: center;
        pointer-events: none;
        z-index: 1000;
        transition: opacity 2s ease-out;
        letter-spacing: 0.1em;
        line-height: 2;
        text-transform: uppercase;
    ">
        <div style="font-size: 8px; margin-bottom: 20px; opacity: 0.7;">
            Allow location to sync local sunrise/sunset times<br>
            Default is 12 hrs - 6am and 6pm<br>
            (No data is collected or stored)
        </div>
        [F] TOGGLE <u>F</u>IREFLIES<br>
        [O] TOGGLE CLOCK <u>O</u>RBS<br>
        [T] TOGGLE 12/24H <u>T</u>IME FORMAT<br>
        DOUBLE CLICK FOR DIGITAL CLOCK
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const overlay = document.getElementById('controls-overlay');
                if (overlay) overlay.style.opacity = '0';
            }, 4000);
        });
    </script>

    <!-- Three.js Setup -->
    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { Sky } from 'https://esm.sh/three@0.160.0/examples/jsm/objects/Sky.js';
        import { EffectComposer } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // Scene Setup
        const scene = new THREE.Scene();

        // Sun Data State
        let sunData = {
            sunrise: 6.0,
            sunset: 18.0,
            solarNoon: 12.0,
            dayLength: 12.0,
            isReal: false
        };

        // Fetch Sunrise/Sunset Data
        async function fetchSunData() {
            if (!navigator.geolocation) {
                return;
            }
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                try {
                    // Using Open-Meteo API as it is more reliable and has better CORS support
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=sunrise,sunset&timezone=auto`);
                    if (!response.ok) throw new Error("Network response was not ok");
                    
                    const data = await response.json();
                    if (data && data.daily && data.daily.sunrise && data.daily.sunset) {
                        const sunrise = new Date(data.daily.sunrise[0]);
                        const sunset = new Date(data.daily.sunset[0]);
                        
                        sunData.sunrise = sunrise.getHours() + sunrise.getMinutes() / 60 + sunrise.getSeconds() / 3600;
                        sunData.sunset = sunset.getHours() + sunset.getMinutes() / 60 + sunset.getSeconds() / 3600;
                        sunData.dayLength = sunData.sunset - sunData.sunrise;
                        sunData.isReal = true;
                    } else {
                        throw new Error("Invalid API response structure");
                    }
                } catch (error) {
                    console.error("Sun API Error:", error);
                }
            }, (error) => {
                console.warn("Geolocation failed:", error);
            }, { timeout: 10000 });
        }
        fetchSunData();
        
        // Renderer & Camera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000000);
        camera.position.set(0, 0.5, 12.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Post-Processing
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.22, 1.00, 0.99);
        
        const finalComposer = new EffectComposer(renderer);
        finalComposer.addPass(renderScene);
        finalComposer.addPass(bloomPass);

        // Star System
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500; 
        const starPositions = new Float32Array(starCount * 3);
        const starRandoms = new Float32Array(starCount);
        
        for (let i = 0; i < starCount; i++) {
            const r = 850 + Math.random() * 150;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random()); 
            
            starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i * 3 + 1] = r * Math.cos(phi); 
            starPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
            
            starRandoms[i] = Math.random();
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('aRandom', new THREE.BufferAttribute(starRandoms, 1));
        
        const starMaterial = new THREE.ShaderMaterial({
            uniforms: {
                opacity: { value: 0 },
                size: { value: 1.0 }, // Set to 1x1 pixel
                time: { value: 0 }
            },
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            vertexShader: `
                uniform float size;
                uniform float time;
                attribute float aRandom;
                varying float vOpacity;
                varying float vTwinkle;
                varying vec3 vColor;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    
                    // Individual twinkle (brightness only)
                    float twinkleFreq = 0.6 + aRandom * 1.5;
                    vTwinkle = 0.75 + 0.25 * sin(time * twinkleFreq + aRandom * 62.8);

                    // Subtle color variation based on random attribute
                    float colorShift = fract(aRandom * 10.0);
                    if (colorShift < 0.3) vColor = vec3(1.0, 0.95, 0.9); // Warm
                    else if (colorShift < 0.6) vColor = vec3(0.9, 0.95, 1.0); // Cool
                    else vColor = vec3(1.0, 1.0, 1.0); // White
                    
                    gl_PointSize = 1.0; // Exactly 1x1 pixel
                    gl_Position = projectionMatrix * mvPosition;
                    
                    float yNorm = clamp(position.y / 1000.0, 0.0, 1.0);
                    vOpacity = smoothstep(0.0, 0.1, yNorm); 
                }
            `,
            fragmentShader: `
                uniform float opacity;
                varying float vOpacity;
                varying float vTwinkle;
                varying vec3 vColor;
                void main() {
                    // Simple 1x1 pixel point
                    float alpha = opacity * vOpacity * vTwinkle;
                    // Multiply color by 2.0 to trigger bloom threshold
                    gl_FragColor = vec4(vColor * 2.0, alpha);
                }
            `
        });

        const starPoints = new THREE.Points(starGeometry, starMaterial);
        starPoints.renderOrder = -1;
        scene.add(starPoints);

        // Physical Sky
        const sky = new Sky();
        sky.scale.setScalar(450000);
        sky.frustumCulled = false;
        sky.renderOrder = -2;
        
        // Ensure sky is visible from inside and doesn't block stars
        sky.material.side = THREE.BackSide;
        sky.material.depthWrite = false;
        
        sky.material.onBeforeCompile = (shader) => {
            shader.fragmentShader = shader.fragmentShader.replace(
                'float sundisk = smoothstep( sunAngularDiameterCos, sunAngularDiameterCos + 0.00002, cosTheta );',
                'float sundisk = 0.0;'
            );
        };
        scene.add(sky);

        const sun = new THREE.Vector3();
        const skyParams = {
            turbidity: 12.1,
            rayleigh: 1.48,
            mieCoefficient: 0.0,
            mieDirectionalG: 0.7,
            elevation: 1.8,
            azimuth: 192.1,
            exposure: 0.34,
            ozone: 0.64,
            manualTime: null,
            isFirefliesActive: false,
            isClockVisible: true,
            is24HourFormat: false
        };

        function updateSky() {
            const uniforms = sky.material.uniforms;
            uniforms['turbidity'].value = skyParams.turbidity;
            uniforms['rayleigh'].value = skyParams.rayleigh;
            uniforms['mieCoefficient'].value = skyParams.mieCoefficient;
            uniforms['mieDirectionalG'].value = skyParams.mieDirectionalG;

            const phi = THREE.MathUtils.degToRad(90 - skyParams.elevation);
            const theta = THREE.MathUtils.degToRad(skyParams.azimuth);

            sun.setFromSphericalCoords(1, phi, theta);
            uniforms['sunPosition'].value.copy(sun);
            renderer.toneMappingExposure = skyParams.exposure;

            if (cloudMaterial) {
                cloudMaterial.uniforms.sunPosition.value.copy(sun);
                
                // Moon is roughly opposite to the sun
                const moonPhi = THREE.MathUtils.degToRad(90 + skyParams.elevation);
                const moonTheta = THREE.MathUtils.degToRad(skyParams.azimuth + 180);
                const moonPos = new THREE.Vector3().setFromSphericalCoords(1, moonPhi, moonTheta);
                cloudMaterial.uniforms.moonPosition.value.copy(moonPos);

                const elevation = skyParams.elevation;
                const azimuth = skyParams.azimuth;
                
                // Dynamic Sun Intensity: drops off as sun goes below horizon
                const sunIntensity = Math.max(0, Math.min(1.0, (elevation + 10) / 25));
                
                // Moon Intensity: peaks when sun is deep below horizon
                const moonIntensity = Math.max(0, Math.min(0.8, (-elevation) / 20));
                cloudMaterial.uniforms.moonColor.value.setRGB(0.8, 0.9, 1.0).multiplyScalar(moonIntensity);

                // City Light Intensity: higher at night
                const cityIntensity = Math.max(0, Math.min(1.0, (-elevation - 5) / 15));
                cloudMaterial.uniforms.cityLightIntensity.value = cityIntensity;

                // Light Color (Direct Sun) - Multi-stage transition for realism
                const colorDay = new THREE.Color(1.0, 0.98, 0.92);      // Bright midday
                const colorGolden = new THREE.Color(1.0, 0.75, 0.3);   // Golden hour
                const colorSunset = new THREE.Color(1.0, 0.35, 0.05);  // Deep sunset
                const colorTwilight = new THREE.Color(0.4, 0.1, 0.35); // Post-sunset purple
                
                const lightColor = new THREE.Color();
                
                // Azimuth Influence: shift warmth slightly based on East/West
                // Azimuth 90 (Sunrise) to 180 (Sunset)
                const azFactor = (azimuth - 135) / 45; // -1 at sunrise, 0 at mid-day, 1 at sunset
                const azWarmth = Math.abs(azFactor) * 0.1;

                if (elevation > 5) {
                    lightColor.lerpColors(colorGolden, colorDay, Math.min(1, (elevation - 5) / 10));
                } else if (elevation > 0) {
                    lightColor.lerpColors(colorSunset, colorGolden, elevation / 5);
                } else if (elevation > -10) {
                    lightColor.lerpColors(colorTwilight, colorSunset, (elevation + 10) / 10);
                } else {
                    lightColor.setRGB(0.04, 0.04, 0.12); // Night light
                }
                
                // Apply azimuth warmth shift
                lightColor.r = Math.min(1.0, lightColor.r + azWarmth);
                lightColor.g = Math.max(0.0, lightColor.g - azWarmth * 0.5);

                lightColor.multiplyScalar(sunIntensity);
                cloudMaterial.uniforms.lightColor.value.copy(lightColor);
                
                // Shadow Color (Ambient/Sky light) - Reacts to sky state
                const ambientIntensity = Math.max(0.05, Math.min(1, (elevation + 20) / 40));
                const shadowColor = new THREE.Color();
                
                if (elevation > 0) {
                    // Day: Blueish shadows from sky scattering, shifting to purple at low sun
                    const skyBlue = new THREE.Color(0.45, 0.6, 0.85);
                    const sunsetPurple = new THREE.Color(0.5, 0.4, 0.7);
                    shadowColor.lerpColors(sunsetPurple, skyBlue, Math.min(1, elevation / 10));
                } else {
                    // Night: Deep indigo/purple transition
                    const nightBlue = new THREE.Color(0.02, 0.02, 0.08);
                    const twilightPurple = new THREE.Color(0.2, 0.1, 0.4);
                    shadowColor.lerpColors(nightBlue, twilightPurple, Math.max(0, (elevation + 15) / 15));
                }
                
                // Azimuth influence on shadows: slightly cooler shadows opposite the sun
                shadowColor.b = Math.min(1.0, shadowColor.b + azWarmth * 0.2);

                shadowColor.multiplyScalar(ambientIntensity);
                cloudMaterial.uniforms.shadowColor.value.copy(shadowColor);
                
                // Dynamic Exposure for clouds
                const exposureBase = skyParams.exposure;
                const cloudExposure = elevation > 0 ? exposureBase : exposureBase * (1.0 - Math.min(0.7, Math.abs(elevation) / 15));
                cloudMaterial.uniforms.exposure.value = cloudExposure;
            }
        }

        // Raymarching Shader
        const vertexShader = `
            varying vec3 vOrigin;
            varying vec3 vDirection;
            void main() {
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                vOrigin = vec3(inverse(modelMatrix) * vec4(cameraPosition, 1.0)).xyz;
                vDirection = position - vOrigin;
            }
        `;

        const fragmentShader = `
            precision highp float;
            varying vec3 vOrigin;
            varying vec3 vDirection;
            
            uniform float time;
            uniform vec3 sunPosition;
            uniform vec3 moonPosition;
            uniform vec3 shadowColor;
            uniform vec3 lightColor;
            uniform vec3 moonColor;
            uniform vec3 cityLightColor;
            uniform float cityLightIntensity;
            uniform float exposure;
            uniform float noiseScale;
            uniform float noiseAmplitude;
            uniform float cloudCoverage;
            uniform float noiseAmplitudeTime;
            uniform float cloudCoverageTime;
            uniform vec3 cloudBounds;
            
            uniform float timeMode; // 0.0 = cloud, 1.0 = numbers
            uniform vec4 digits;    // h1, h2, m1, m2

            // Fireflies
            uniform vec3 fireflyPositions[12];
            uniform float fireflyIntensities[12];
            uniform float globalFireflyIntensity;

            // --- 3D Simplex Noise ---
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            float fbm(vec3 p, int octaves) {
                float f = 0.0;
                float amp = 0.5;
                for(int i=0; i<6; i++) {
                    if (i >= octaves) break;
                    f += amp * snoise(p);
                    p *= 2.3;
                    amp *= 0.48;
                }
                return f;
            }

            // SDF for a 7-segment display digit
            float sdSegment(vec2 p, vec2 a, vec2 b) {
                vec2 pa = p - a, ba = b - a;
                float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
                return length(pa - ba * h);
            }

            float sdDigit(vec2 p, float digit) {
                float d = 1e10;
                float w = 0.4, h = 0.8;
                vec2 a = vec2(-w, h), b = vec2(w, h), c = vec2(w, 0.0), d_ = vec2(w, -h), e = vec2(-w, -h), f = vec2(-w, 0.0), g = vec2(0.0, 0.0);
                
                int i = int(digit);
                // Segments: 0:top, 1:top-right, 2:bottom-right, 3:bottom, 4:bottom-left, 5:top-left, 6:middle
                if(i==0||i==2||i==3||i==5||i==6||i==7||i==8||i==9) d = min(d, sdSegment(p, a, b));
                if(i==0||i==1||i==2||i==3||i==4||i==7||i==8||i==9) d = min(d, sdSegment(p, b, c));
                if(i==0||i==1||i==3||i==4||i==5||i==6||i==7||i==8||i==9) d = min(d, sdSegment(p, c, d_));
                if(i==0||i==2||i==3||i==5||i==6||i==8||i==9) d = min(d, sdSegment(p, d_, e));
                if(i==0||i==2||i==6||i==8) d = min(d, sdSegment(p, e, f));
                if(i==0||i==4||i==5||i==6||i==8||i==9) d = min(d, sdSegment(p, f, a));
                if(i==2||i==3||i==4||i==5||i==6||i==8||i==9) d = min(d, sdSegment(p, f, c));
                
                return d - 0.09;
            }

            float map(vec3 p, int octaves) {
                // Standard cloud shape
                vec3 pScaled = p * cloudBounds;
                float dCloud = length(pScaled) - 2.5;
                
                // Time numbers shape
                float dTime = 1e10;
                // Scale UV for 35% larger numbers (divide by 1.35)
                // Shifted right and up to adjust position
                vec2 uv = (p.xy - vec2(0.025, 0.0)) / 1.35; 
                float spacing = 1.2;
                dTime = min(dTime, sdDigit(uv - vec2(-spacing * 1.5, 0.0), digits.x));
                dTime = min(dTime, sdDigit(uv - vec2(-spacing * 0.5, 0.0), digits.y));
                // Colon
                float dColon = min(length(uv - vec2(0.0, 0.3)), length(uv - vec2(0.0, -0.3))) - 0.1;
                dTime = min(dTime, dColon);
                dTime = min(dTime, sdDigit(uv - vec2(spacing * 0.5, 0.0), digits.z));
                dTime = min(dTime, sdDigit(uv - vec2(spacing * 1.5, 0.0), digits.w));
                
                // Scale dTime back to world space
                dTime *= 1.35;

                // Add some depth to the numbers
                dTime = max(dTime, abs(p.z) - 0.5);

                // Thicken the numbers slightly more
                dTime -= 0.18;

                // Calculate a mask for the digits to apply specific effects
                float digitMask = smoothstep(0.5, -0.5, dTime);

                float d = mix(dCloud, dTime, timeMode);

                vec3 noisePos = p * noiseScale - vec3(time * 0.04, 0.0, 0.0);
                float noise = fbm(noisePos, octaves);
                
                // Add high-frequency detail noise at the edges
                if (octaves > 2) {
                    float detail = snoise(p * noiseScale * 4.0 + time * 0.1) * 0.12;
                    noise += detail;
                }
                
                // Use separate controls for time mode
                float currentNoiseAmp = mix(noiseAmplitude, noiseAmplitudeTime, timeMode);
                
                // 1. Sharpen edges: Reduce noise amplitude specifically for digits
                currentNoiseAmp *= mix(1.0, 0.35, digitMask * timeMode);
                
                float currentCoverage = mix(cloudCoverage, cloudCoverageTime, timeMode);
                
                // 2. Increase base density: Boost coverage for digits
                currentCoverage += digitMask * timeMode * 0.6;
                
                float density = smoothstep(1.0, -1.5, d + noise * currentNoiseAmp - currentCoverage);
                return clamp(density, 0.0, 1.0);
            }

            // Simple hash for ray jittering
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }

            // Ray-sphere intersection to find entry/exit points
            vec2 intersectSphere(vec3 origin, vec3 dir, float radius) {
                float b = dot(origin, dir);
                float c = dot(origin, origin) - radius * radius;
                float h = b * b - c;
                if (h < 0.0) return vec2(-1.0);
                h = sqrt(h);
                return vec2(-b - h, -b + h);
            }

            void main() {
                vec3 rayDir = normalize(vDirection);
                vec3 rayPos = vOrigin;
                
                // Find intersection with bounding sphere (radius 5.5)
                vec2 bounds = intersectSphere(rayPos, rayDir, 5.5);
                if (bounds.y < 0.0) discard;
                
                float tStart = max(0.0, bounds.x);
                float tEnd = bounds.y;
                
                // Ray jittering to hide banding with fewer steps
                float jitter = hash(gl_FragCoord.xy) * 0.2;
                float t = tStart + jitter;
                
                float stepSize = 0.15; 
                vec4 color = vec4(0.0);
                vec3 lightDir = normalize(sunPosition);
                vec3 moonDir = normalize(moonPosition);
                
                for(int i=0; i<64; i++) { 
                    if (t > tEnd || color.a > 0.98) break;
                    
                    vec3 p = rayPos + rayDir * t;
                    float density = map(p, 4); 
                    
                    if(density > 0.01) {
                        // Multi-sample shadow for volumetric depth (Sun)
                        float shadow = 1.0;
                        float shadowDist = 0.35;
                        for(int j=1; j<=3; j++) {
                            float d = map(p + lightDir * shadowDist * float(j), 1);
                            shadow *= exp(-d * 2.2);
                        }

                        // Moonlight Shadow
                        float moonShadow = 1.0;
                        for(int j=1; j<=2; j++) {
                            float d = map(p + moonDir * shadowDist * float(j), 1);
                            moonShadow *= exp(-d * 2.0);
                        }
                        
                        // Powder effect: darkening at the edges where light is absorbed
                        float powder = 1.0 - exp(-density * 4.0);
                        
                        // Dual-lobe Henyey-Greenstein phase function (Sun)
                        float cosTheta = dot(rayDir, lightDir);
                        float g1 = 0.82; // Forward scattering (silver lining)
                        float g2 = -0.12; // Backward scattering
                        float phase1 = (1.0 - g1*g1) / pow(1.0 + g1*g1 - 2.0*g1*cosTheta, 1.5);
                        float phase2 = (1.0 - g2*g2) / pow(1.0 + g2*g2 - 2.0*g2*cosTheta, 1.5);
                        float phase = mix(phase1, phase2, 0.5);

                        // Moonlight Phase (Silver Lining)
                        float cosThetaMoon = dot(rayDir, moonDir);
                        float moonPhase = (1.0 - g1*g1) / pow(1.0 + g1*g1 - 2.0*g1*cosThetaMoon, 1.5);
                        
                        // Combine lighting components
                        vec3 directLight = lightColor * (1.0 + phase * 2.0) * shadow * powder;
                        vec3 moonDirect = moonColor * (1.0 + moonPhase * 2.5) * moonShadow * powder;
                        
                        // City Light Underglow (Idea 3)
                        // p.y ranges roughly from -2.5 to 2.5 in the cloud volume
                        float bottomGlow = smoothstep(1.0, -2.5, p.y);
                        vec3 cityGlow = cityLightColor * cityLightIntensity * bottomGlow * density * 0.5;

                        // Multiple scattering approximation
                        float ms = 0.5 + 0.5 * shadow;
                        directLight *= ms;
                        
                        vec3 ambientLight = shadowColor * (1.0 - density * 0.5);
                        
                        // 3. Subtle Internal Glow for digits
                        // We need to re-calculate a rough digit mask here
                        vec2 uvDigit = (p.xy - vec2(0.025, 0.0)) / 1.35;
                        float dTimeGlow = sdDigit(uvDigit - vec2(-1.2 * 1.5, 0.0), digits.x);
                        dTimeGlow = min(dTimeGlow, sdDigit(uvDigit - vec2(-1.2 * 0.5, 0.0), digits.y));
                        dTimeGlow = min(dTimeGlow, min(length(uvDigit - vec2(0.0, 0.3)), length(uvDigit - vec2(0.0, -0.3))) - 0.1);
                        dTimeGlow = min(dTimeGlow, sdDigit(uvDigit - vec2(1.2 * 0.5, 0.0), digits.z));
                        dTimeGlow = min(dTimeGlow, sdDigit(uvDigit - vec2(1.2 * 1.5, 0.0), digits.w));
                        float digitGlowMask = smoothstep(0.4, -0.4, dTimeGlow) * timeMode;
                        vec3 digitGlow = vec3(0.7, 0.9, 1.0) * digitGlowMask * 0.8;

                        vec3 cloudColor = directLight + moonDirect + cityGlow + ambientLight + digitGlow;
                        
                        // Firefly lighting
                        for(int j=0; j<12; j++) {
                            float dFirefly = length(p - fireflyPositions[j]);
                            // Slower falloff for firefly light
                            float atten = exp(-dFirefly * 1.2) * 2.5;
                            vec3 fireflyColor = vec3(0.8, 1.0, 0.4); // Brighter yellow-green
                            cloudColor += fireflyColor * atten * fireflyIntensities[j] * globalFireflyIntensity * density;
                        }

                        cloudColor *= exposure;
                        
                        float alpha = density * mix(0.6, 0.8, timeMode); 
                        alpha = mix(alpha, density * 0.9, digitGlowMask);
                        color.rgb += (1.0 - color.a) * cloudColor * alpha;
                        color.a += (1.0 - color.a) * alpha;
                    }
                    t += stepSize;
                }
                
                gl_FragColor = color;
            }
        `;

        const geometry = new THREE.BoxGeometry(15, 15, 15);
        const cloudMaterial = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                time: { value: 0 },
                sunPosition: { value: new THREE.Vector3() },
                moonPosition: { value: new THREE.Vector3() },
                shadowColor: { value: new THREE.Color(0.6, 0.7, 0.85) },
                lightColor: { value: new THREE.Color(1.0, 0.98, 0.95) },
                moonColor: { value: new THREE.Color(0.8, 0.9, 1.0) },
                cityLightColor: { value: new THREE.Color(1.0, 0.5, 0.2) },
                cityLightIntensity: { value: 0.0 },
                exposure: { value: 0.34 },
                noiseScale: { value: 0.57 },
                noiseAmplitude: { value: 2.87 },
                cloudCoverage: { value: -1.07 },
                noiseAmplitudeTime: { value: 0.32 },
                cloudCoverageTime: { value: -0.90 },
                cloudBounds: { value: new THREE.Vector3(0.71, 1.45, 1.79) },
                timeMode: { value: 0 },
                digits: { value: new THREE.Vector4(0, 0, 0, 0) },
                fireflyPositions: { value: Array(12).fill(0).map(() => new THREE.Vector3()) },
                fireflyIntensities: { value: new Float32Array(12).fill(0) },
                globalFireflyIntensity: { value: 0 }
            },
            transparent: true,
            side: THREE.BackSide,
            depthWrite: false
        });

        const cloudVolume = new THREE.Mesh(geometry, cloudMaterial);
        cloudVolume.renderOrder = 1;
        scene.add(cloudVolume);

        // Glowing Torus
        const outerRadius = 4.0;
        const innerRadius = outerRadius * 0.99;
        const torusRadius = (outerRadius + innerRadius) / 2;
        const torusTube = (outerRadius - innerRadius) / 2;

        const torusGeometry = new THREE.TorusGeometry(torusRadius, torusTube, 32, 128);
        const torusMaterial = new THREE.MeshBasicMaterial({ 
            color: new THREE.Color(0x00ffff).multiplyScalar(10),
            transparent: true,
            opacity: 0.9
        });
        const torus = new THREE.Mesh(torusGeometry, torusMaterial);
        torus.rotation.z = Math.PI / 2;
        scene.add(torus);

        // Clock Face Numbers
        const clockNumbersGroup = new THREE.Group();
        const numberRadius = torusRadius * 1.15;
        const numberSprites = [];

        function updateNumberSprites() {
            for (let i = 1; i <= 12; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.font = 'Bold 80px "Poiret One", cursive';
                ctx.fillStyle = '#00ffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i.toString(), 64, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                if (numberSprites[i-1]) {
                    numberSprites[i-1].material.map.dispose();
                    numberSprites[i-1].material.map = texture;
                    numberSprites[i-1].material.needsUpdate = true;
                } else {
                    const spriteMaterial = new THREE.SpriteMaterial({ 
                        map: texture,
                        transparent: true,
                        opacity: 0
                    });
                    const sprite = new THREE.Sprite(spriteMaterial);
                    sprite.scale.set(0.6, 0.6, 1);
                    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                    sprite.position.set(
                        Math.cos(angle) * numberRadius,
                        -Math.sin(angle) * numberRadius,
                        0
                    );
                    clockNumbersGroup.add(sprite);
                    numberSprites.push(sprite);
                }
            }
        }

        updateNumberSprites();
        if (document.fonts) {
            document.fonts.ready.then(updateNumberSprites);
        }
        scene.add(clockNumbersGroup);

        // Clock Spheres
        const hourSphereGeom = new THREE.SphereGeometry(0.15, 32, 32);
        const minSphereGeom = new THREE.SphereGeometry(0.1, 32, 32);
        const secSphereGeom = new THREE.SphereGeometry(0.05, 32, 32);
        const clockMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        
        const hourSphere = new THREE.Mesh(hourSphereGeom, clockMaterial.clone());
        const minSphere = new THREE.Mesh(minSphereGeom, clockMaterial.clone());
        const secSphere = new THREE.Mesh(secSphereGeom, clockMaterial.clone());

        hourSphere.material.color.multiplyScalar(10);
        minSphere.material.color.multiplyScalar(10);
        secSphere.material.color.multiplyScalar(10);

        scene.add(hourSphere);
        scene.add(minSphere);
        scene.add(secSphere);

        // Firefly System
        const fireflyCount = 12;
        const fireflyData = [];
        const fireflyGeometry = new THREE.BufferGeometry();
        const fireflyPosArray = new Float32Array(fireflyCount * 3);
        const fireflyVelArray = new Float32Array(fireflyCount * 3);
        
        for (let i = 0; i < fireflyCount; i++) {
            fireflyData.push({
                position: new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 6,
                    (Math.random() - 0.5) * 4
                ),
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.01,
                    (Math.random() - 0.5) * 0.01,
                    (Math.random() - 0.5) * 0.01
                ),
                offset: Math.random() * Math.PI * 2
            });
        }

        const fireflyMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                globalIntensity: { value: 0 }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexShader: `
                uniform float time;
                uniform float globalIntensity;
                attribute float aOffset;
                attribute float aIntensity;
                attribute vec3 aVelocity;
                varying float vIntensity;
                varying vec2 vScreenVelocity;

                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vIntensity = aIntensity * globalIntensity;
                    
                    // Project velocity to screen space for motion blur
                    vec4 velProj = projectionMatrix * modelViewMatrix * vec4(position + aVelocity, 1.0);
                    vec4 posProj = projectionMatrix * mvPosition;
                    vScreenVelocity = (velProj.xy / velProj.w - posProj.xy / posProj.w) * 50.0;

                    // Increase point size based on speed for motion blur
                    float speed = length(vScreenVelocity);
                    gl_PointSize = 45.0 * (1.0 / -mvPosition.z) * vIntensity * (1.0 + speed * 0.5);
                    gl_Position = posProj;
                }
            `,
            fragmentShader: `
                varying float vIntensity;
                varying vec2 vScreenVelocity;

                void main() {
                    vec2 p = gl_PointCoord - vec2(0.5);
                    
                    // Motion blur: stretch the point along the velocity vector
                    float speed = length(vScreenVelocity);
                    vec2 dir = speed > 0.001 ? vScreenVelocity / speed : vec2(0.0);
                    
                    // Capsule distance calculation
                    float len = clamp(dot(p, dir), -speed * 0.2, speed * 0.2);
                    float dist = length(p - dir * len);
                    
                    if (dist > 0.5) discard;
                    
                    // Softer glow with motion blur stretching
                    float glow = pow(1.0 - dist * 2.0, 1.5);
                    gl_FragColor = vec4(0.8, 1.0, 0.4, glow * vIntensity);
                }
            `
        });

        const fireflyOffsets = new Float32Array(fireflyCount);
        const fireflyIntensities = new Float32Array(fireflyCount);
        for(let i=0; i<fireflyCount; i++) {
            fireflyOffsets[i] = fireflyData[i].offset;
            fireflyIntensities[i] = 0;
        }
        fireflyGeometry.setAttribute('aOffset', new THREE.BufferAttribute(fireflyOffsets, 1));
        fireflyGeometry.setAttribute('aIntensity', new THREE.BufferAttribute(fireflyIntensities, 1));
        fireflyGeometry.setAttribute('aVelocity', new THREE.BufferAttribute(fireflyVelArray, 3));
        fireflyGeometry.setAttribute('position', new THREE.BufferAttribute(fireflyPosArray, 3));

        const fireflyPoints = new THREE.Points(fireflyGeometry, fireflyMaterial);
        fireflyPoints.renderOrder = 2;
        scene.add(fireflyPoints);

        // Shooting Star System
        let lastShootingStarCheck = 0;
        let lastShootingStarTrigger = 0;
        const shootingStarCooldown = 5 * 60 * 1000; // 5 minutes
        const shootingStarCheckInterval = 2000; // 2 seconds

        const shootingStarGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0, 0, -20)
        ]);
        const shootingStarMat = new THREE.LineBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0,
            blending: THREE.AdditiveBlending,
            linewidth: 2
        });
        const shootingStar = new THREE.Line(shootingStarGeom, shootingStarMat);
        shootingStar.visible = false;
        scene.add(shootingStar);

        let shootingStarActive = false;
        let shootingStarStartTime = 0;
        const shootingStarDuration = 800; // 0.8 seconds animation

        function triggerShootingStar(isManual = false) {
            if (shootingStarActive) return;
            
            shootingStarActive = true;
            shootingStar.visible = true;
            shootingStarStartTime = Date.now();
            
            if (!isManual) {
                lastShootingStarTrigger = Date.now();
            }
            
            // Randomize position in the upper hemisphere
            const theta = Math.random() * Math.PI * 2; // Azimuth
            const phi = Math.acos(Math.random() * 0.5 + 0.2); // Elevation (mostly above horizon)
            const dist = 800;
            
            const x = dist * Math.sin(phi) * Math.cos(theta);
            const y = dist * Math.cos(phi);
            const z = dist * Math.sin(phi) * Math.sin(theta);
            
            shootingStar.position.set(x, y, z);
            
            // Aim towards a random point roughly across the sky
            const target = new THREE.Vector3(
                -x + (Math.random() - 0.5) * 400,
                y * 0.5 + (Math.random() - 0.5) * 200,
                -z + (Math.random() - 0.5) * 400
            );
            shootingStar.lookAt(target);
        }

        updateSky();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            finalComposer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        let timeDisplayTimer = 0;
        const TIME_DISPLAY_DURATION = 4;

        renderer.domElement.addEventListener('dblclick', () => {
            timeDisplayTimer = TIME_DISPLAY_DURATION;
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'f') {
                skyParams.isFirefliesActive = !skyParams.isFirefliesActive;
            } else if (key === 'o') {
                skyParams.isClockVisible = !skyParams.isClockVisible;
                torus.visible = skyParams.isClockVisible;
                hourSphere.visible = skyParams.isClockVisible;
                minSphere.visible = skyParams.isClockVisible;
                secSphere.visible = skyParams.isClockVisible;
            } else if (key === 't') {
                skyParams.is24HourFormat = !skyParams.is24HourFormat;
            }
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            cloudMaterial.uniforms.time.value += dt;

            // Time display transition
            if (timeDisplayTimer > 0) {
                timeDisplayTimer -= dt;
                cloudMaterial.uniforms.timeMode.value = Math.min(1, cloudMaterial.uniforms.timeMode.value + dt * 2);
                
                // Update digits while showing
                const now_clock = new Date();
                let h_disp, m_disp;
                if (skyParams.manualTime !== null) {
                    h_disp = Math.floor(skyParams.manualTime);
                    m_disp = Math.floor((skyParams.manualTime % 1) * 60);
                } else {
                    h_disp = now_clock.getHours();
                    m_disp = now_clock.getMinutes();
                }
                
                if (!skyParams.is24HourFormat) {
                    h_disp = h_disp % 12;
                    if (h_disp === 0) h_disp = 12;
                }
                
                cloudMaterial.uniforms.digits.value.set(
                    Math.floor(h_disp / 10), h_disp % 10,
                    Math.floor(m_disp / 10), m_disp % 10
                );
            } else {
                cloudMaterial.uniforms.timeMode.value = Math.max(0, cloudMaterial.uniforms.timeMode.value - dt * 2);
            }

            // Update clock face numbers opacity
            const currentOpacity = cloudMaterial.uniforms.timeMode.value;
            numberSprites.forEach(sprite => {
                sprite.material.opacity = currentOpacity;
            });

            // Sun Position
            const now = new Date();
            let hourFloat;
            
            if (skyParams.manualTime !== null) {
                hourFloat = skyParams.manualTime;
            } else {
                hourFloat = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
            }

            // Azimuth calculation: 00:00 -> 327.45, 12:00 -> 139.76, 24:00 -> 327.45
            if (hourFloat < 12) {
                const t = hourFloat / 12;
                skyParams.azimuth = 327.45 + 172.31 * t;
            } else {
                const t = (hourFloat - 12) / 12;
                skyParams.azimuth = 139.76 + 187.69 * t;
            }
            if (skyParams.azimuth >= 360) skyParams.azimuth -= 360;
            
            if (sunData.isReal) {
                const dayLength = sunData.sunset - sunData.sunrise;
                const nightLength = 24 - dayLength;
                
                if (hourFloat >= sunData.sunrise && hourFloat <= sunData.sunset) {
                    const t = (hourFloat - sunData.sunrise) / dayLength;
                    skyParams.elevation = 5.0 * Math.sin(Math.PI * t); 
                } else {
                    let t;
                    if (hourFloat > sunData.sunset) {
                        t = (hourFloat - sunData.sunset) / nightLength;
                    } else {
                        t = (hourFloat + (24 - sunData.sunset)) / nightLength;
                    }
                    skyParams.elevation = -15.0 * Math.sin(Math.PI * t); 
                }
            } else {
                // Default sun path (6 AM to 6 PM)
                const sunrise = 6;
                const sunset = 18;
                const dayLength = 12;
                const nightLength = 12;

                if (hourFloat >= sunrise && hourFloat <= sunset) {
                    const t = (hourFloat - sunrise) / dayLength;
                    skyParams.elevation = 5.0 * Math.sin(Math.PI * t);
                } else {
                    let t = hourFloat > sunset ? (hourFloat - sunset) / nightLength : (hourFloat + 6) / nightLength;
                    skyParams.elevation = -15.0 * Math.sin(Math.PI * t);
                }
            }

            updateSky();

            // Fireflies Animation (Boids + Realistic Flashing)
            if (skyParams.isFirefliesActive) {
                fireflyPoints.visible = true;
                const globalFireflyIntensity = Math.max(0, Math.min(1.0, (-skyParams.elevation) / 10));
                cloudMaterial.uniforms.globalFireflyIntensity.value = globalFireflyIntensity;
                fireflyMaterial.uniforms.globalIntensity.value = globalFireflyIntensity;
                fireflyMaterial.uniforms.time.value = elapsedTime;

                const fPosAttr = fireflyGeometry.attributes.position;
                const fIntensityAttr = fireflyGeometry.attributes.aIntensity;
                const fVelAttr = fireflyGeometry.attributes.aVelocity;
                const separationDist = 1.2;
                const neighborDist = 3.5;
                
                for (let i = 0; i < fireflyCount; i++) {
                    const f = fireflyData[i];
                    
                    let separation = new THREE.Vector3();
                    let alignment = new THREE.Vector3();
                    let cohesion = new THREE.Vector3();
                    let count = 0;
                    
                    for (let j = 0; j < fireflyCount; j++) {
                        if (i === j) continue;
                        const other = fireflyData[j];
                        const dist = f.position.distanceTo(other.position);
                        
                        if (dist > 0 && dist < neighborDist) {
                            if (dist < separationDist) {
                                let diff = f.position.clone().sub(other.position);
                                diff.normalize().divideScalar(dist);
                                separation.add(diff);
                            }
                            alignment.add(other.velocity);
                            cohesion.add(other.position);
                            count++;
                        }
                    }
                    
                    if (count > 0) {
                        alignment.divideScalar(count).normalize().multiplyScalar(0.0006);
                        cohesion.divideScalar(count).sub(f.position).normalize().multiplyScalar(0.0006);
                        separation.normalize().multiplyScalar(0.0012);
                        
                        f.velocity.add(alignment);
                        f.velocity.add(cohesion);
                        f.velocity.add(separation);
                    }
                    
                    // Attraction to center (Cloud)
                    const toCenter = f.position.clone().negate().normalize().multiplyScalar(0.0004);
                    f.velocity.add(toCenter);

                    // Realistic "Bobbing" and Burst movement
                    // Fireflies often hover and then move in short bursts
                    const burst = Math.sin(elapsedTime * 2.0 + f.offset) > 0.8 ? 0.001 : 0.0001;
                    f.velocity.x += (Math.sin(elapsedTime * 0.5 + f.offset) * burst);
                    f.velocity.y += (Math.cos(elapsedTime * 1.5 + f.offset) * 0.0005); // Vertical bobbing
                    f.velocity.z += (Math.sin(elapsedTime * 0.3 + f.offset) * burst);
                    
                    f.velocity.multiplyScalar(0.97); // Damping
                    f.velocity.clampLength(0, 0.025); // Speed limit
                    f.position.add(f.velocity);
                    
                    // Tighter bounds (slightly further from cloud)
                    if (f.position.length() > 5.5) {
                        f.velocity.add(f.position.clone().normalize().multiplyScalar(-0.025));
                    }

                    // Realistic Flashing Pattern
                    // Quick ramp up, short hold, ramp down, long dark period
                    const cycleTime = (elapsedTime + f.offset * 10) % 6.0; // 6 second cycle
                    let currentIntensity = 0;
                    if (cycleTime < 0.5) {
                        // Ramp up
                        currentIntensity = cycleTime / 0.5;
                    } else if (cycleTime < 0.8) {
                        // Hold
                        currentIntensity = 1.0;
                    } else if (cycleTime < 1.3) {
                        // Ramp down
                        currentIntensity = 1.0 - (cycleTime - 0.8) / 0.5;
                    } else {
                        // Dark period
                        currentIntensity = 0.0;
                    }
                    
                    // Add a tiny bit of "glow" even when not flashing
                    currentIntensity = Math.max(0.05, currentIntensity);

                    fPosAttr.setXYZ(i, f.position.x, f.position.y, f.position.z);
                    fIntensityAttr.setX(i, currentIntensity);
                    fVelAttr.setXYZ(i, f.velocity.x, f.velocity.y, f.velocity.z);
                    cloudMaterial.uniforms.fireflyPositions.value[i].copy(f.position);
                    cloudMaterial.uniforms.fireflyIntensities.value[i] = currentIntensity;
                }
                fPosAttr.needsUpdate = true;
                fIntensityAttr.needsUpdate = true;
                fVelAttr.needsUpdate = true;
            } else {
                fireflyPoints.visible = false;
                cloudMaterial.uniforms.globalFireflyIntensity.value = 0;
                fireflyMaterial.uniforms.globalIntensity.value = 0;
            }

            // Stars
            let starOpacity = 0;
            if (skyParams.elevation < 2) {
                starOpacity = Math.min(1, (2 - skyParams.elevation) / 5);
            }
            starMaterial.uniforms.opacity.value = starOpacity;
            starMaterial.uniforms.time.value = elapsedTime;

            // Shooting Star Logic
            const currentTime = Date.now();
            if (skyParams.elevation < 0 && !shootingStarActive && (currentTime - lastShootingStarTrigger > shootingStarCooldown)) {
                if (currentTime - lastShootingStarCheck > shootingStarCheckInterval) {
                    lastShootingStarCheck = currentTime;
                    if (Math.random() < 0.005) { // 0.5% chance
                        triggerShootingStar();
                    }
                }
            }

            if (shootingStarActive) {
                const progress = (currentTime - shootingStarStartTime) / shootingStarDuration;
                if (progress >= 1) {
                    shootingStarActive = false;
                    shootingStar.visible = false;
                    shootingStarMat.opacity = 0;
                } else {
                    // Fade in and out
                    shootingStarMat.opacity = Math.sin(progress * Math.PI) * 0.8;
                    shootingStar.translateZ(15); // Move fast
                }
            }

            // Clock Hands
            let h_val, m_val, s_val, ms_val;
            if (skyParams.manualTime !== null) {
                h_val = Math.floor(skyParams.manualTime) % 12;
                m_val = (skyParams.manualTime % 1) * 60;
                s_val = (m_val % 1) * 60;
                ms_val = 0;
                m_val = Math.floor(m_val);
            } else {
                h_val = now.getHours() % 12;
                m_val = now.getMinutes();
                s_val = now.getSeconds();
                ms_val = now.getMilliseconds();
            }

            const secAngle = ((s_val + ms_val / 1000) / 60) * Math.PI * 2;
            const minAngle = ((m_val + s_val / 60) / 60) * Math.PI * 2;
            const hourAngle = ((h_val + m_val / 60) / 12) * Math.PI * 2;

            const r = torusRadius;
            secSphere.position.set(r * Math.sin(secAngle), r * Math.cos(secAngle), 0);
            minSphere.position.set(r * Math.sin(minAngle), r * Math.cos(minAngle), 0);
            hourSphere.position.set(r * Math.sin(hourAngle), r * Math.cos(hourAngle), 0);

            controls.update();
            finalComposer.render();
        }
        animate();
    </script>
</body>
</html>
